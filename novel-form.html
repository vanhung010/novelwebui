<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Author Workspace - Thông tin truyện</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/novel-form.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="workspace">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">
            <i class="fa-solid fa-feather-pointed"></i>
          </div>
          <h2>Author Workspace</h2>
        </div>

        <nav class="menu" aria-label="Menu tác giả">
          <a class="menu-item" href="author-dashboard.html"
            ><i class="fa-solid fa-chart-line"></i> Tổng quan</a
          >
          <a class="menu-item active" href="manage-novels.html"
            ><i class="fa-solid fa-book-open"></i> Quản lý truyện</a
          >
          <a class="menu-item" href="manage-comments.html"
            ><i class="fa-solid fa-comments"></i> Bình luận</a
          >
          <a class="menu-item" href="withdrawal.html"
            ><i class="fa-solid fa-wallet"></i> Tài chính</a
          >
        </nav>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button class="menu-toggle" type="button" aria-label="Mở menu">
              <i class="fa-solid fa-bars"></i>
            </button>
            <label class="search-box" aria-label="Tìm kiếm trên workspace">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                type="search"
                placeholder="Tìm truyện, chương hoặc bình luận..."
              />
            </label>
          </div>

          <div class="topbar-right">
            <button class="icon-btn" type="button" aria-label="Thông báo">
              <i class="fa-regular fa-bell"></i>
              <span class="dot" aria-hidden="true"></span>
            </button>

            <details class="profile" aria-label="Author profile dropdown">
              <summary>
                <span class="profile-avatar">AT</span>
                <span class="profile-name">An Trần</span>
                <i class="fa-solid fa-chevron-down"></i>
              </summary>
              <div
                class="profile-menu"
                role="menu"
                aria-label="Tùy chọn tài khoản"
              >
                <a href="#" role="menuitem">Hồ sơ tác giả</a>
                <a href="#" role="menuitem">Cài đặt</a>
                <a href="#" role="menuitem">Đăng xuất</a>
              </div>
            </details>
          </div>
        </header>

        <main class="content">
          <section class="form-card">
            <div class="page-head">
              <h1>Thông tin truyện</h1>
              <a class="back-btn" href="manage-novels.html"
                ><i class="fa-solid fa-arrow-left"></i> Quay lại</a
              >
            </div>

            <form class="novel-form" action="#" method="post">
              <div class="form-group">
                <label for="novel-name">Tên truyện</label>
                <input
                  id="novel-name"
                  name="novel-name"
                  type="text"
                  placeholder="Nhập tên truyện"
                  required
                />
              </div>

              <div class="form-group">
                <p class="field-label">Thể loại</p>
                <div class="checkbox-inline">
                  <label
                    ><input type="checkbox" name="genre" value="tien-hiep" />
                    Tiên hiệp</label
                  >
                  <label
                    ><input type="checkbox" name="genre" value="huyen-huyen" />
                    Huyền huyễn</label
                  >
                  <label
                    ><input type="checkbox" name="genre" value="do-thi" /> Đô
                    thị</label
                  >
                  <label
                    ><input type="checkbox" name="genre" value="ngon-tinh" />
                    Ngôn tình</label
                  >
                  <label
                    ><input type="checkbox" name="genre" value="kiem-hiep" />
                    Kiếm hiệp</label
                  >
                  <label
                    ><input type="checkbox" name="genre" value="xuyen-khong" />
                    Xuyên không</label
                  >
                </div>
              </div>

              <div class="form-group">
                <label for="novel-status">Trạng thái</label>
                <select id="novel-status" name="novel-status">
                  <option value="ongoing">Đang ra</option>
                  <option value="completed">Hoàn thành</option>
                </select>
              </div>

              <div class="form-group">
                <label for="novel-cover">Ảnh bìa</label>
                <input
                  id="novel-cover"
                  name="novel-cover"
                  type="file"
                  accept="image/*"
                />
                <div class="cover-preview" id="coverPreview" aria-live="polite">
                  Chưa có ảnh
                </div>
              </div>

              <div class="form-group">
                <label for="novel-summary">Tóm tắt nội dung</label>
                <textarea
                  id="novel-summary"
                  name="novel-summary"
                  rows="5"
                  placeholder="Mô tả ngắn gọn nội dung truyện..."
                ></textarea>
              </div>

              <div class="form-footer">
                <button type="submit" class="btn-primary">Lưu lại</button>
                <a class="btn-secondary" href="manage-novels.html">Hủy bỏ</a>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>

    <div class="overlay" aria-hidden="true"></div>

    <script>
      const toggleButton = document.querySelector(".menu-toggle");
      const overlay = document.querySelector(".overlay");
      const body = document.body;
      const coverInput = document.getElementById("novel-cover");
      const coverPreview = document.getElementById("coverPreview");

      if (toggleButton && overlay) {
        toggleButton.addEventListener("click", function () {
          body.classList.toggle("sidebar-open");
        });

        overlay.addEventListener("click", function () {
          body.classList.remove("sidebar-open");
        });
      }

      if (coverInput && coverPreview) {
        coverInput.addEventListener("change", function () {
          const file = this.files && this.files[0];
          if (!file) {
            coverPreview.style.backgroundImage = "none";
            coverPreview.textContent = "Chưa có ảnh";
            return;
          }

          const objectUrl = URL.createObjectURL(file);
          coverPreview.style.backgroundImage = 'url("' + objectUrl + '")';
          coverPreview.textContent = "";
        });
      }
    </script>
  </body>
</html>
