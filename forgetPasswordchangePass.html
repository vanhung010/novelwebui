<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi Mật Khẩu - NovelWeb</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/forgetpassword.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">Novel<span>Web</span></a>
        <h2>Đặt Mật Khẩu Mới</h2>
        <p>Tạo mát khẩu mạnh để bảo vệ tài khoản của bạn</p>
      </div>

      <div class="forgot-progress">
        <div class="progress-step completed">
          <div class="progress-number">✓</div>
          <span>Email</span>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step completed">
          <div class="progress-number">✓</div>
          <span>Mã Code</span>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step active">
          <div class="progress-number">3</div>
          <span>Mật Khẩu Mới</span>
        </div>
      </div>

      <form class="auth-form" id="passwordForm">
        <div class="form-group">
          <label for="newPassword">Mật Khẩu Mới</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              id="newPassword"
              placeholder="Nhập mật khẩu mới (ít nhất 8 ký tự)"
              minlength="8"
              required
            />
            <button type="button" class="toggle-password" toggles="newPassword">
              👁️
            </button>
          </div>
          <div class="password-strength">
            <div class="strength-bar" id="strengthBar"></div>
            <p id="strengthText"></p>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác Nhận Mật Khẩu</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Nhập lại mật khẩu"
              required
            />
            <button type="button" class="toggle-password" toggles="confirmPassword">
              👁️
            </button>
          </div>
        </div>

        <div id="passwordError" class="password-error"></div>

        <div class="password-requirements">
          <h4>Yêu cầu mật khẩu:</h4>
          <ul>
            <li id="req-length">
              <span class="req-icon">○</span> Ít nhất 8 ký tự
            </li>
            <li id="req-uppercase">
              <span class="req-icon">○</span> Chứa ít nhất 1 chữ in hoa
            </li>
            <li id="req-lowercase">
              <span class="req-icon">○</span> Chứa ít nhất 1 chữ thường
            </li>
            <li id="req-number">
              <span class="req-icon">○</span> Chứa ít nhất 1 chữ số
            </li>
          </ul>
        </div>

        <button type="submit" class="btn-primary btn-block">
          Cập Nhật Mật Khẩu
        </button>
      </form>

      <div class="auth-footer">
        <p>
          <a href="forgetPasswordwithEmail.html">← Bắt đầu lại</a>
        </p>
      </div>
    </div>

    <script>
      const newPasswordInput = document.getElementById("newPassword");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const passwordForm = document.getElementById("passwordForm");
      const passwordError = document.getElementById("passwordError");
      const strengthBar = document.getElementById("strengthBar");
      const strengthText = document.getElementById("strengthText");

      // Kiểm tra độ mạnh mật khẩu
      function checkPasswordStrength(password) {
        let strength = 0;
        const requirements = {
          length: password.length >= 8,
          uppercase: /[A-Z]/.test(password),
          lowercase: /[a-z]/.test(password),
          number: /[0-9]/.test(password),
        };

        // Cập nhật UI các yêu cầu
        document.getElementById("req-length").classList.toggle(
          "met",
          requirements.length
        );
        document.getElementById("req-uppercase").classList.toggle(
          "met",
          requirements.uppercase
        );
        document.getElementById("req-lowercase").classList.toggle(
          "met",
          requirements.lowercase
        );
        document.getElementById("req-number").classList.toggle(
          "met",
          requirements.number
        );

        // Tính điểm mạnh
        if (requirements.length) strength += 25;
        if (requirements.uppercase) strength += 25;
        if (requirements.lowercase) strength += 25;
        if (requirements.number) strength += 25;

        // Cập nhật thanh mạnh mật khẩu
        strengthBar.style.width = strength + "%";
        if (strength <= 50) {
          strengthBar.style.backgroundColor = "#ef4444"; // Red
          strengthText.textContent = "Yếu";
        } else if (strength <= 75) {
          strengthBar.style.backgroundColor = "#f59e0b"; // Amber
          strengthText.textContent = "Trung bình";
        } else {
          strengthBar.style.backgroundColor = "#10b981"; // Green
          strengthText.textContent = "Mạnh";
        }

        return requirements;
      }

      // Theo dõi thay đổi mật khẩu
      newPasswordInput.addEventListener("input", function () {
        checkPasswordStrength(this.value);
      });

      // Toggle hiển thị mật khẩu
      document.querySelectorAll(".toggle-password").forEach((btn) => {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          const inputId = this.getAttribute("toggles");
          const input = document.getElementById(inputId);
          input.type = input.type === "password" ? "text" : "password";
          this.textContent = input.type === "password" ? "👁️" : "👁️‍🗨️";
        });
      });

      // Xử lý submit form
      passwordForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Kiểm tra mật khẩu khớp
        if (newPassword !== confirmPassword) {
          passwordError.textContent = "Mật khẩu xác nhận không khớp!";
          passwordError.style.display = "block";
          return;
        }

        // Kiểm tra độ mạnh
        const requirements = checkPasswordStrength(newPassword);
        if (
          !requirements.length ||
          !requirements.uppercase ||
          !requirements.lowercase ||
          !requirements.number
        ) {
          passwordError.textContent =
            "Mật khẩu không đáp ứng các yêu cầu!";
          passwordError.style.display = "block";
          return;
        }

        passwordError.style.display = "none";

        // Thành công - chuyển hướng đến đăng nhập
        alert("Đặt mật khẩu mới thành công! Vui lòng đăng nhập.");
        window.location.href = "login.html";
      });

      // Kiểm tra mật khẩu ban đầu khi tải trang
      checkPasswordStrength("");
    </script>
  </body>
</html>
