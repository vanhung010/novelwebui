<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác Thực Mã Code - NovelWeb</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/forgetpassword.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="logo">Novel<span>Web</span></a>
        <h2>Xác Thực Mã Code</h2>
        <p>Nhập mã code 6 số được gửi đến email của bạn</p>
      </div>

      <div class="forgot-progress">
        <div class="progress-step completed">
          <div class="progress-number">✓</div>
          <span>Email</span>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step active">
          <div class="progress-number">2</div>
          <span>Mã Code</span>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step">
          <div class="progress-number">3</div>
          <span>Mật Khẩu Mới</span>
        </div>
      </div>

      <form class="auth-form" id="codeForm">
        <div class="form-group">
          <label for="code">Mã Xác Thực</label>
          <input
            type="text"
            id="code"
            class="code-input"
            placeholder="000000"
            maxlength="6"
            inputmode="numeric"
            required
            pattern="[0-9]{6}"
          />
          <p class="form-hint">
            Hãy kiểm tra thư mục Spam nếu không thấy email
          </p>
        </div>

        <button type="submit" class="btn-primary btn-block">
          Xác Thực Mã
        </button>
      </form>

      <div class="form-resend">
        <p>Không nhận được mã?</p>
        <button type="button" class="btn-resend" id="resendBtn">
          Gửi lại mã
        </button>
      </div>

      <div class="auth-footer">
        <p>
          <a href="forgetPasswordwithEmail.html">← Quay lại</a>
        </p>
      </div>
    </div>

    <script>
      // Chỉ cho phép nhập số
      document.getElementById("code").addEventListener("keydown", function (e) {
        if (!/[0-9]/.test(e.key) && !["Backspace", "Delete", "Tab", "ArrowLeft", "ArrowRight"].includes(e.key)) {
          e.preventDefault();
        }
      });

      document.getElementById("codeForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const code = document.getElementById("code").value;
        if (code.length === 6) {
          // Chuyển hướng đến trang đổi mật khẩu
          window.location.href = "forgetPasswordchangePass.html";
        }
      });

      // Gửi lại mã
      let resendCount = 0;
      const resendBtn = document.getElementById("resendBtn");
      resendBtn.addEventListener("click", function () {
        resendCount++;
        if (resendCount >= 3) {
          resendBtn.disabled = true;
          resendBtn.textContent = "Đã vượt quá lần gửi lại";
        } else {
          resendBtn.textContent = "Đã gửi lại mã";
          setTimeout(() => {
            resendBtn.textContent = "Gửi lại mã";
          }, 3000);
        }
      });
    </script>
  </body>
</html>
